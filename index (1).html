<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7efe8" />
  <title>活动打卡文案生成器</title>
  <style>
    :root {
      --bg: #f7efe8;
      --card: rgba(255,255,255,.86);
      --text: #2d2622;
      --muted: #766b64;
      --accent: #8a4f3d;
      --accent-dark: #6f3d2e;
      --line: rgba(45,38,34,.12);
      --shadow: 0 18px 50px rgba(80,54,43,.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.92), transparent 34%),
        radial-gradient(circle at 90% 18%, rgba(216,181,157,.28), transparent 32%),
        var(--bg);
    }
    .wrap {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: max(24px, env(safe-area-inset-top)) 18px max(32px, env(safe-area-inset-bottom));
    }
    header { text-align: center; padding: 20px 8px 24px; }
    .eyebrow { font-size: 12px; letter-spacing: .18em; color: var(--muted); }
    h1 { margin: 10px 0 8px; font-size: clamp(28px, 7vw, 42px); line-height: 1.15; }
    header p { margin: 0 auto; max-width: 34em; color: var(--muted); line-height: 1.7; font-size: 15px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 22px;
      backdrop-filter: blur(10px);
    }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    #copyText {
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.8;
      min-height: 180px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      user-select: text;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    button, a.btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: 50px;
      padding: 13px 16px;
      font: inherit;
      font-weight: 650;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }
    button:active, a.btn:active { transform: scale(.98); }
    .primary { background: var(--accent); color: white; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: white; color: var(--text); border: 1px solid var(--line); }
    .wide { grid-column: 1 / -1; }
    .steps { margin-top: 18px; padding: 18px 20px; border-radius: 18px; background: rgba(255,255,255,.58); border: 1px solid var(--line); }
    .steps strong { display: block; margin-bottom: 8px; }
    .steps ol { margin: 0; padding-left: 20px; color: var(--muted); line-height: 1.8; font-size: 14px; }
    .toast {
      position: fixed; left: 50%; bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translate(-50%, 18px); opacity: 0; pointer-events: none;
      background: rgba(36,31,28,.92); color: white; padding: 11px 16px; border-radius: 999px;
      transition: .2s ease; font-size: 14px; z-index: 10;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    footer { text-align: center; margin-top: 22px; font-size: 12px; color: var(--muted); }
    @media (max-width: 430px) {
      .actions { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      #copyText { font-size: 17px; min-height: 200px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="eyebrow">XUPING 旭平首饰 × HotBake Moment 此刻热麦</div>
      <h1>抽一句你的打卡文案</h1>
      <p>每次随机生成一句文案，并自动拼接固定话题。复制后打开小红书，选择照片并粘贴发布。</p>
    </header>

    <section class="card" aria-labelledby="generatorTitle">
      <div class="label" id="generatorTitle">本次随机文案</div>
      <div id="copyText" aria-live="polite"></div>

      <div class="actions">
        <button class="secondary" id="refreshBtn" type="button">换一句</button>
        <button class="primary" id="copyBtn" type="button">复制文案和话题</button>
        <a class="btn secondary wide" id="profileBtn" href="#" rel="noopener">查看 / 关注小红书账号</a>
        <a class="btn primary wide" id="topicBtn" href="#" rel="noopener">进入小红书活动页</a>
      </div>

      <div class="steps">
        <strong>发布只需 3 步</strong>
        <ol>
          <li>点击“复制文案和话题”。</li>
          <li>打开小红书，选择现场照片。</li>
          <li>粘贴文案，按自己的真实体验修改后发布。</li>
        </ol>
      </div>
    </section>

    <footer>提示：网页不会自动关注或自动发布，最终操作由用户本人完成。</footer>
  </main>

  <div class="toast" id="toast" role="status"></div>

  <script>
    // ===== 只需要修改这一段配置 =====
    const CONFIG = {
      brandName: "旭平首饰 × 此刻热麦",
      fixedHashtags: [
        "#旭平首饰",
        "#此刻热麦",
        "#七待此刻巧饰悦己",
        "#美戴旭平一整夏",
        "#广州探店",
        "#咖啡店打卡",
        "#探店拍照",
        "@旭平首饰",
        "@此刻热麦"
      ],
      // 在小红书 App 中打开账号主页/话题页，点“分享-复制链接”，把链接粘贴到这里。
      profileUrl: "https://xhslink.cn/m/52UqzDQo3ID",
      topicUrl: "YOUR_XHS_TOPIC_SHARE_LINK",
      copyPool: [
        "今天的心动，是咖啡香里刚好闪过的一点光。",
        "把喜欢戴在身上，也把松弛留给此刻。",
        "甜意入口，闪耀上身，今天只负责悦己。",
        "一杯咖啡的时间，解锁一套新的自己。",
        "七夕不只等待心动，也可以主动制造心动。",
        "饰品不是答案，是我今天心情的标点。",
        "先取悦自己，再慢慢遇见所有好事。",
        "面包是软的，首饰是亮的，今天的我刚刚好。",
        "把平凡的一天，戴出一点不平凡。",
        "此刻有甜，此刻有光，此刻很喜欢自己。",
        "今日穿搭完成度：咖啡、面包和一点闪耀。",
        "不等特别的日子，今天就值得认真打扮。"
        // 把剩余文案逐行加在这里，格式："文案内容",
      ]
    };
    // ===== 配置结束 =====

    const copyText = document.getElementById("copyText");
    const toast = document.getElementById("toast");
    const profileBtn = document.getElementById("profileBtn");
    const topicBtn = document.getElementById("topicBtn");
    let lastIndex = -1;
    let currentText = "";

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function buildText(copy) {
      return `${copy}\n\n${CONFIG.fixedHashtags.join(" ")}`;
    }

    function randomize() {
      if (!CONFIG.copyPool.length) {
        currentText = "请先在代码的 copyPool 中加入文案。";
      } else {
        let index = Math.floor(Math.random() * CONFIG.copyPool.length);
        if (CONFIG.copyPool.length > 1) {
          while (index === lastIndex) index = Math.floor(Math.random() * CONFIG.copyPool.length);
        }
        lastIndex = index;
        currentText = buildText(CONFIG.copyPool[index]);
      }
      copyText.textContent = currentText;
    }

    async function copyCurrentText() {
      try {
        await navigator.clipboard.writeText(currentText);
        showToast("已复制，去小红书粘贴吧");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = currentText;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand("copy");
        textarea.remove();
        showToast(ok ? "已复制，去小红书粘贴吧" : "复制失败，请长按文案手动复制");
      }
    }

    function setupLink(element, url, missingMessage) {
      element.addEventListener("click", (event) => {
        if (!url || url.startsWith("YOUR_")) {
          event.preventDefault();
          showToast(missingMessage);
          return;
        }
        element.href = url;
      });
    }

    document.getElementById("refreshBtn").addEventListener("click", randomize);
    document.getElementById("copyBtn").addEventListener("click", copyCurrentText);
    setupLink(profileBtn, CONFIG.profileUrl, "请先替换账号主页分享链接");
    setupLink(topicBtn, CONFIG.topicUrl, "请先替换话题页分享链接");

    randomize();
  </script>
</body>
</html>
